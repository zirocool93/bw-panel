services:
  app:
    build: .
    environment:
      APP_NAME: ${APP_NAME:-Портал трансляций боулинг-клуба}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://bowling:bowling@postgres:5432/bowling}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}
      NGINX_HLS_BASE_URL: ${NGINX_HLS_BASE_URL:-http://localhost/hls}
      OME_RTMP_BASE_URL: ${OME_RTMP_BASE_URL:-rtmp://localhost:1935}
      OME_API_URL: ${OME_API_URL:-http://mediamtx:9997}
      OME_API_ACCESS_TOKEN: ${OME_API_ACCESS_TOKEN:-}
      DEFAULT_ARCHIVE_DEPTH_DAYS: ${DEFAULT_ARCHIVE_DEPTH_DAYS:-14}
      DEFAULT_PLAYBACK_TYPE: ${DEFAULT_PLAYBACK_TYPE:-hls}
      ARCHIVE_ROOT: ${ARCHIVE_ROOT:-/opt/bowling-portal/media/archive}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./media:/opt/bowling-portal/media
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/auth/login >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  mediamtx-configurator:
    build: .
    command: ["python", "-m", "scripts.mediamtx_configurator"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://bowling:bowling@postgres:5432/bowling}
      MEDIAMTX_CONFIG_PATH: /config/mediamtx.yml
      MEDIAMTX_CONFIG_POLL_SECONDS: ${MEDIAMTX_CONFIG_POLL_SECONDS:-10}
    volumes:
      - ./deploy/mediamtx:/config
    depends_on:
      postgres:
        condition: service_healthy
      mediamtx:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bowling}
      POSTGRES_USER: ${POSTGRES_USER:-bowling}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bowling}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bowling} -d ${POSTGRES_DB:-bowling}"]
      interval: 5s
      timeout: 5s
      retries: 20

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
      mediamtx:
        condition: service_started
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./media:/opt/bowling-portal/media:ro
    restart: unless-stopped

  mediamtx:
    image: bluenviron/mediamtx:latest
    command: ["/config/mediamtx.yml"]
    ports:
      - "${OME_RTMP_PORT:-1935}:1935"
      - "${OME_API_PORT:-9997}:9997"
      - "${OME_RTSP_PORT:-8554}:8554"
      - "${OME_ORIGIN_PORT:-8888}:8888"
    volumes:
      - ./deploy/mediamtx:/config

volumes:
  postgres_data:
