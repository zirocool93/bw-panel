services:
  app:
    build: .
    environment:
      APP_NAME: ${APP_NAME:-Портал трансляций боулинг-клуба}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://bowling:bowling@postgres:5432/bowling}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}
      NGINX_HLS_BASE_URL: ${NGINX_HLS_BASE_URL:-http://localhost/hls}
      OME_RTMP_BASE_URL: ${OME_RTMP_BASE_URL:-rtmp://localhost:1935/app}
      OME_API_URL: ${OME_API_URL:-http://ovenmediaengine:8081}
      OME_API_ACCESS_TOKEN: ${OME_API_ACCESS_TOKEN:-ome-access-token}
      DEFAULT_ARCHIVE_DEPTH_DAYS: ${DEFAULT_ARCHIVE_DEPTH_DAYS:-14}
      DEFAULT_PLAYBACK_TYPE: ${DEFAULT_PLAYBACK_TYPE:-hls}
      ARCHIVE_ROOT: ${ARCHIVE_ROOT:-/opt/bowling-portal/media/archive}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./media:/opt/bowling-portal/media
    expose:
      - "8000"

  camera-worker:
    build: .
    command: ["python", "-m", "scripts.camera_restream"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://bowling:bowling@postgres:5432/bowling}
      CAMERA_RESTREAM_RTMP_BASE_URL: ${CAMERA_RESTREAM_RTMP_BASE_URL:-rtmp://ovenmediaengine:1935/app}
      CAMERA_RESTREAM_POLL_SECONDS: ${CAMERA_RESTREAM_POLL_SECONDS:-10}
      CAMERA_RESTREAM_TRANSCODE: ${CAMERA_RESTREAM_TRANSCODE:-0}
      CAMERA_RESTREAM_VIDEO_FILTER: ${CAMERA_RESTREAM_VIDEO_FILTER:-scale='min(1920,iw)':-2}
      CAMERA_RESTREAM_VIDEO_BITRATE: ${CAMERA_RESTREAM_VIDEO_BITRATE:-4500k}
    depends_on:
      postgres:
        condition: service_healthy
      ovenmediaengine:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bowling}
      POSTGRES_USER: ${POSTGRES_USER:-bowling}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bowling}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bowling} -d ${POSTGRES_DB:-bowling}"]
      interval: 5s
      timeout: 5s
      retries: 20

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
      - ovenmediaengine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./media:/opt/bowling-portal/media:ro

  ovenmediaengine:
    image: airensoft/ovenmediaengine:latest
    environment:
      OME_API_PORT: ${OME_API_PORT:-8081}
      OME_API_ACCESS_TOKEN: ${OME_API_ACCESS_TOKEN:-admin:ome-access-token}
    ports:
      - "${OME_RTMP_PORT:-1935}:1935"
      - "${OME_API_PORT:-8081}:8081"
      - "${OME_ORIGIN_PORT:-3333}:3333"
    volumes:
      - ./deploy/ovenmediaengine/Server.xml:/opt/ovenmediaengine/bin/origin_conf/Server.xml:ro

volumes:
  postgres_data:
