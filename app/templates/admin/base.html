<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Админка{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/site.css" rel="stylesheet">
</head>
<body class="admin-body">
<div class="admin-shell">
  <aside class="admin-sidebar">
    <div class="brand">Bowling Portal</div>
    <nav class="nav flex-column">
      <a class="nav-link" href="/admin">Панель</a>
      <a class="nav-link" href="/admin/tournaments">Турниры</a>
      <a class="nav-link" href="/admin/cameras">Камеры</a>
      <a class="nav-link" href="/admin/obs-inputs">OBS-входы</a>
      <a class="nav-link" href="/admin/users">Пользователи</a>
      <a class="nav-link" href="/admin/settings">Настройки</a>
      <a class="nav-link" href="/">Публичный сайт</a>
    </nav>
  </aside>
  <div class="admin-content">
    <header class="admin-topbar">
      <div>{% block heading %}Админка{% endblock %}</div>
      <form method="post" action="/auth/logout"><button class="btn btn-sm btn-outline-secondary">Выйти</button></form>
    </header>
    <main class="p-4">{% block content %}{% endblock %}</main>
  </div>
</div>
</body>
</html>
